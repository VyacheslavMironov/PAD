<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Дописать мета теги для поисковых систем -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAD</title>
    <!-- Load: style -->
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/media.css" type="text/css">
    <!-- CDN: BoxIcons -->
    <script src="https://unpkg.com/boxicons@2.1.2/dist/boxicons.js"></script>
    <!-- CDN: Vue.Js -->
    <script src="https://unpkg.com/vue@3"></script>
</head>
<body id="app">
    <header>
        <div  class="logotype">
            <a href="#" class="logotype_link">
                <h2 class="logotype_link-text center">PAD</h2>
            </a>
        </div>
        <div id="user_menu" class="menu">
            <!-- Тут надо условиями фигачить меню -->
            <menu-view type_user="student"></menu-view>
            <!-- END -->
        </div>
        <div class="bar">
            <span class="bar_icon">
                <img class="bar_icon-item" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAAXNSR0IArs4c6QAAAS9JREFUSEu1VYENgjAQhAl0AxlBJxAnME4gI+gEuoGOgBvoBOIE6ga4gU6gd00htbShQNvkApTv3f+VL3EUeMSB+aM2gQQJLIEUmAJ85iiBB1AAF/lszNUmMEb0AcgcK8wRtwXeerxJgJleAYp0GSRfyMrqdbpAKsm7EKuxFFlJ68S8KsCM70DSl12uK3GdVXapAhtM0ncfg/tx1CsoMDH3wQ6OG0C7/yz6eiKvaIQ7qkXcoJFHkYZAcIv2yH7nqQLjJvMzZftPBoq8sJ7NKrpabzS+oFV99+Ijvx4mKobtqOgj0iC3CXCedrFR1o52nRDHRnU67FROW2/Q5+q4PuO+tCXS9j/QBayZDhWgv7Qgd7SsDnOp4InoTFrSlb/1l8mMjZvnqtRWgSuPNS64wA8QmjcZ/DRdLwAAAABJRU5ErkJggg=="/>
            </span>
            <!-- Тут тоже зафигачить условие на тип студента -->
            <span class="bar_icon">
                <img class="bar_icon-item" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAAXNSR0IArs4c6QAAAMFJREFUSEtjZKAxYKSx+QyjFhAMYeQgcgCqng/ECgR1oSp4AOQmAvEBbPqQLQAplCfRcJhykF5FQhb8J9NwmDZkxy4ACiaAJJAFqWGBANDM9UAMCm6w2dS0wBAahwZQL1Hdgg9Ag0E+QAkyavoAPQqp7gOaW/ARaAM/LYMIFMmg5KlPq0gGhTkokjcAsT0tkinBjAZKZshhiB5p+PgPgZIK2BSgF3agMCS1PAIZngDEBwhZQIqLiVY7WqMRDCqaBxEAJ8wcGbfLwwIAAAAASUVORK5CYII="/>
            </span>
            <!-- END -->
            <span onclick="menu.control()" class="bar_icon">
                <img class="bar_icon-item" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAAXNSR0IArs4c6QAAAExJREFUSEtjZKAxYKSx+QyjFhAM4QEJov8EnYVfAYqjsfmA5hZQ6AFU7QMSBzT3Ac3jgOYW0DyIhr4FNI8Dmlsw9ONg1AcoIUDz0hQAbegGGXzv/l0AAAAASUVORK5CYII="/>
            </span>
        </div>
    </header>

    <section class="submenu sandarted" id="menu">
        <submenu-view type_user="student" first_name="Артём" last_name="Лобов">
            <button_link-component link="#" class="center m-center" text="Выход"></button_link-component>
        </submenu-view>
    </section>

    <main class="wrapper">
        <section class="contianer" id="card">
            <div id="jounal-app" class="journal">
                <!-- Месячный переключатель -->
                <mount-count></mount-count>
                <div class="journal_groups">
                    <div id="groups" class="card">
                        <table>
                            <tbody>
                                <tr>
                                    <td>
                                        <div class="form"><!-- Компонент -->
                                            <div  class="form_input mb-0">
                                                <group-select></group-select>
                                            </div>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="journal_info">
                    <div id="" class="card df">
                        <button_link-component text="1 неделя" link="#"></button_link-component>
                        <button_link-component text="2 неделя" link="#"></button_link-component>
                        <button_link-component text="3 неделя" link="#"></button_link-component>
                        <button_link-component text="4 неделя" link="#"></button_link-component>
                    </div>
                </div>

                <div class="df">
                    <div id="jounal_week-app" class="card w-12">
                        <week-list></week-list>
                    </div>
                    <div class="card journal_data-admin">
                        <div id="add">
                            <button-add></button-add>
                        </div>
                        <div id="error_data" class="card_error">
                            <div class="card_error-content">
                                <h3 class="card_error-content_text">Данных нет</h3>
                                <p class="card_error-content_text">
                                    Нажмите на кнопку добавить строку<br>
                                    и вы добавите новую запись.
                                </p>
                            </div>
                        </div>
                        <div id="start_info" class="card_ajs">
                            <div class="card_ajs-content">
                                <h3 class="card_ajs-content_text">Выберите день недели</h3>
                            </div>
                        </div>
                        <div id="x-dn" class="df">
                            <div class="row-sb">
                                <div id="table" class="table">
                                    <table-admin></table-admin>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <section class="btn">
        <div id="button_top" onclick="eventClickButtonTop()" class="btn_top round">
            <svg xmlns="http://www.w3.org/2000/svg"  style="fill: rgba(0, 0, 0, 1);"><path d="M11 8.414V18h2V8.414l4.293 4.293 1.414-1.414L12 4.586l-6.707 6.707 1.414 1.414z"></path></svg>
        </div>
    </section>
    
    <footer>
        <div  class="logotype">
            <a href="#" class="logotype_link">
                <h2 class="logotype_link-text">PAD</h2>
            </a>
        </div>
        <div class="footer">
            <div class="footer_content">
                <div class="footer_content-item">
                    <a href="#">О журнале</a>
                </div>
                <div class="footer_content-item">
                    <a href="#">Правила пользователя</a>
                </div>
            </div>
            <div class="footer_content">
                <div class="footer_content-item">
                    <a href="#">Вопросы и ответы</a>
                </div>
                <div class="footer_content-item">
                    <a href="#">Служба поддержки</a>
                </div>
            </div>
        </div>
    </footer>
</body>

<!-- Компонент списка групп или классов -->
<script src="scripts/js/components/journal/group_select.js"></script>
<!-- Компонент таблицы администратора -->
<script src="scripts/js/components/journal/table_admin.js"></script>

<!-- Кнопка добавления строки  -->
<script src="scripts/js/components/journal/button_add_string.js"></script>
<!-- Подключение компонента ссылочеой кнопки. -->
<script src="scripts/js/components/button_link.js"></script>
<!-- Подключение компонента ссылочеой кнопки. -->
<script src="scripts/js/components/user_menu/menu.js"></script>
<!-- Подключение компонента ссылочеой кнопки. -->
<script src="scripts/js/components/user_menu/submenu.js"></script>
<!-- Компонент карточки -->
<script src="scripts/js/components/card.js"></script>
<!-- Компонент списка дней недели -->
<script src="scripts/js/components/journal/week_list.js"></script>
<!-- Компонент счётчика месяца -->
<script src="scripts/js/components/journal/mounth_count.js"></script>
<!-- Компонент списка предметов -->
<script src="scripts/js/components/journal/full_select.js"></script>
<!-- Логика меню -->
<script src="scripts/js/menu.js"></script>
<!-- Логика кнопки наверх -->
<script src="scripts/js/top_screen.js"></script>
<!-- Логика кликов на элементы -->
<script src="scripts/js/click.js"></script>
</html>
