<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Дописать мета теги для поисковых систем -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAD</title>
    <!-- Load: style -->
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/media.css" type="text/css">
    <!-- CDN: BoxIcons -->
    <script src="https://unpkg.com/boxicons@2.1.2/dist/boxicons.js"></script>
    <!-- CDN: Vue.Js -->
    <script src="https://unpkg.com/vue@3"></script>
</head>
<body id="app">
    <header>
        <div  class="logotype">
            <a href="#" class="logotype_link">
                <h2 class="logotype_link-text center">PAD</h2>
            </a>
        </div>
        <button_link-component link="signin.html" class="center" text="Вход"></button_link-component>
    </header>

    <main class="wrapper">
        <section class="contianer" id="card">
            <card-component id="signup" form title="Регистрация" component="signup">
                <form-registration-component>
                    <div id="one_form">
                        <form-registration-step_one></form-registration-step_one>
                    </div>
                    <div id="two_form">
                        <form-registration-step_two></form-registration-step_two>
                    </div>
                    <div id="free_form">
                        <form-registration-step_free></form-registration-step_free>
                    </div>
                </form-registration-component>
            </card-component>
        </section>
    </main>
    
    <footer>
        <div  class="logotype">
            <a href="#" class="logotype_link">
                <h2 class="logotype_link-text">PAD</h2>
            </a>
        </div>
        <div class="footer">
            <div class="footer_content">
                <div class="footer_content-item">
                    <a href="#">О журнале</a>
                </div>
                <div class="footer_content-item">
                    <a href="#">Правила пользователя</a>
                </div>
            </div>
            <div class="footer_content">
                <div class="footer_content-item">
                    <a href="#">Вопросы и ответы</a>
                </div>
                <div class="footer_content-item">
                    <a href="#">Служба поддержки</a>
                </div>
            </div>
        </div>
    </footer>
</body>

<!-- Подключение компонентов представляющие шаги регистрации формы. -->
<script src="scripts/js/components/button_link.js"></script>
<!-- Компоненты состовляющие форму -->
<script src="scripts/js/components/registration_form/step_one.js"></script>
<script src="scripts/js/components/registration_form/step_two.js"></script>
<script src="scripts/js/components/registration_form/step_free.js"></script>
<!-- Компонент формы -->
<script src="scripts/js/components/signup-form.js"></script>
<!-- Компонент карточки -->
<script src="scripts/js/components/card.js"></script>
<!-- Логика обработки и валидации формы для регистрации -->
<script src="scripts/js/signup_form.js"></script>
</html>
