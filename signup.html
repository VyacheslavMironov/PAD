<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Дописать мета теги для поисковых систем -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAD</title>
    <!-- Load: style -->
    <link rel="stylesheet" href="css/style.css" type="text/css">
    <link rel="stylesheet" href="css/media.css" type="text/css">
    <!-- CDN: BoxIcons -->
    <script src="https://unpkg.com/boxicons@2.1.2/dist/boxicons.js"></script>
</head>
<body>
    <header>
        <div class="logotype">
            <a href="#" class="logotype_link">
                <h2 class="logotype_link-text center">PAD</h2>
            </a>
        </div>
        <div class="btn center">
            <a href="#" class="btn_link">Вход</a>
        </div>
    </header>

    <main class="wrapper">
        <section class="contianer">
            <div class="card">
                <div class="card_header">
                    <div class="card_header-text">
                        <h3 class="center">Регистрация</h3>
                    </div>
                    <div class="card_header-bottom">
                        <div class="card_header-bottom__max"></div>
                        <div class="card_header-bottom__min"></div>
                    </div>
                </div>
                <div class="card_body">
                    <form id="app-registration" class="card_body-steps">
                        <div class="form">
                            <div class="form_step">
                                <div class="form_step-one">
                                    <div class="form_input">
                                        <label>Наименование организации</label>
                                        <input type="text" name="organization_name">
                                    </div>
                                    <div class="form_input" id="">
                                        <section>
                                            <label>Тип Организации</label>
                                            <select name="organization_type">
                                                <option value="Колледж">Колледж</option>
                                                <option value="Школа">Школа</option>
                                                <option value="Спортивная секция">Спортивная секция</option>
                                            </select>
                                        </section>
                                    </div>
                                    <div class="form_button">
                                        <div class="btn right center">
                                            <a id="one" class="btn_link">Далее</a>
                                        </div>
                                    </div>
                                </div>
                                <!-- <div class="form_step-two">
                                    <div class="form_input"></div>
                                    <div class="form_input"></div>
                                    <div class="form_button"></div>
                                </div> -->
                                <!-- <div class="form_step-free">
                                    <div class="form_input"></div>
                                    <div class="form_input"></div>
                                    <div class="form_button"></div>
                                </div> -->
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    
    <footer>222222222</footer>
</body>
</html>
