    <header>

    <script type="module">
        /*
            Компонент карточки для формы регистрации.
            Может вскоре найду способ повсеместного её
            сипользования. 
        */
        let app_card_registration = Vue.createApp({});
        app_card_registration.component('card-registration', {
            template: `
            <div class="card">
                <div class="card_header">
                    <div class="card_header-step">
                        <p id="step_count" class="center">1</p>
                    </div>
                    <div class="card_header-text">
                        <h3 class="center">Регистрация</h3>
                    </div>
                    <div class="card_header-bottom">
                        <div class="card_header-bottom__max"></div>
                        <div class="card_header-bottom__min"></div>
                    </div>
                </div>
                <div class="card_body" id="form-registration">
                    <form id="app-registration" class="card_body-steps">
                        <div class="form">
                            <div class="form_step">
                                <div id="one_form"><form-registration-step_one></form-registration-step_one></div>
                                <div id="two_form"><form-registration-step_two></form-registration-step_two></div>
                                <div id="free_form"><form-registration-step_free></form-registration-step_free></div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
            `
        });
        app_card_registration.mount('#card');
    </script>

    <script type="module">
        //  Компонент самой формы для карточки описанной выше.
        let step_one = Vue.createApp({});
        step_one.component('form-registration-step_one', {
            template:`
            <div class="form_step-1">
                <div class="form_input">
                    <label>Наименование организации</label>
                    <input type="text" name="organization_name">
                </div>
                <!-- Автоподгрузка элементов -->
                <div class="form_input" id="organizations"></div>
                <!-- END -->
                <div class="form_button">
                    <div class="btn right center">
                        <a id="one" class="btn_link">Далее</a>
                    </div>
                </div>
            </div>      
            `
        });
        step_one.mount('#one_form');
    </script>

    <script type="module">
        //  Компонент самой формы для карточки описанной выше.
        let step_two = Vue.createApp({});

                </div>
                <div class="form_input">

                </div>
                <div class="form_input">
                    <label>Пароль ещё раз</label>

                    <div class="btn right center">
                        <a id="two" class="btn_link">Далее</a>
                    </div>
                </div>
            </div>      
            `
        });
        step_two.mount('#two_form');
    </script>

<script type="module">

</script>
